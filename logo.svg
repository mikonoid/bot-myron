<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="loop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7971e"/>
      <stop offset="100%" style="stop-color:#ffd200"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#fff" stroke-width="0.5" fill="none">
    <line x1="80" y1="0" x2="80" y2="512"/>
    <line x1="160" y1="0" x2="160" y2="512"/>
    <line x1="240" y1="0" x2="240" y2="512"/>
    <line x1="320" y1="0" x2="320" y2="512"/>
    <line x1="400" y1="0" x2="400" y2="512"/>
    <line x1="0" y1="80" x2="512" y2="80"/>
    <line x1="0" y1="160" x2="512" y2="160"/>
    <line x1="0" y1="240" x2="512" y2="240"/>
    <line x1="0" y1="320" x2="512" y2="320"/>
    <line x1="0" y1="400" x2="512" y2="400"/>
  </g>

  <!-- DevOps infinity loop -->
  <g filter="glow" transform="translate(256, 210)">
    <path d="M-90,0 C-90,-50 -50,-50 0,-50 C50,-50 50,0 50,0 C50,0 50,50 0,50 C-50,50 -90,50 -90,0 Z"
          fill="none" stroke="url(#loop)" stroke-width="14" stroke-linecap="round"
          transform="translate(-45,0) scale(0.7)"/>
    <path d="M90,0 C90,50 50,50 0,50 C-50,50 -50,0 -50,0 C-50,0 -50,-50 0,-50 C50,-50 90,-50 90,0 Z"
          fill="none" stroke="url(#loop)" stroke-width="14" stroke-linecap="round"
          transform="translate(45,0) scale(0.7)"/>
  </g>

  <!-- Terminal cursor / prompt -->
  <g filter="shadow" transform="translate(256, 210)">
    <text x="-2" y="8" font-family="monospace, Courier" font-size="52" font-weight="bold"
          fill="url(#accent)" text-anchor="middle">⚡</text>
  </g>

  <!-- "DevOps" text -->
  <text x="256" y="318" font-family="'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="54" font-weight="800" fill="#ffffff" text-anchor="middle"
        letter-spacing="3" filter="shadow">DEVOPS</text>

  <!-- "DAILY" text -->
  <text x="256" y="365" font-family="'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="40" font-weight="300" fill="url(#accent)" text-anchor="middle"
        letter-spacing="10" filter="shadow">DAILY</text>

  <!-- Small decorative dots -->
  <circle cx="148" cy="388" r="3" fill="#00d2ff" opacity="0.6"/>
  <circle cx="364" cy="388" r="3" fill="#7b2ff7" opacity="0.6"/>
  <circle cx="256" cy="400" r="2" fill="#ffd200" opacity="0.4"/>

  <!-- Bottom tagline -->
  <text x="256" y="420" font-family="'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="14" fill="#8888aa" text-anchor="middle"
        letter-spacing="4">NEWS • CVE • RELEASES</text>

  <!-- Circular border -->
  <circle cx="256" cy="256" r="250" fill="none" stroke="url(#loop)" stroke-width="1.5" opacity="0.3"/>
</svg>
