name: DevOps Daily News Bot

on:
  schedule:
    # Runs every 6 hours: 06:00, 12:00, 18:00, 00:00 UTC
    - cron: "0 6,12,18,0 * * *"
  workflow_dispatch: # manual trigger

permissions:
  contents: write   # to push posted_ids.json back

jobs:
  post-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: "@devopsdaily"
          MAX_ITEMS_PER_FEED: "3"
          MAX_AGE_HOURS: "24"
        run: python bot.py

      - name: Commit posted IDs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_ids.json
          git diff --cached --quiet || git commit -m "chore: update posted_ids.json [skip ci]"
          git push
