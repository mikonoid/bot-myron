name: "📰 DevOps News"

on:
  schedule:
    # 3 рази на день, кожні 8 годин: 06:00, 14:00, 22:00 UTC
    - cron: "0 6,14,22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Post DevOps news
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: "@devopsdaily"
          MAX_ITEMS_PER_FEED: "1"
          MAX_AGE_HOURS: "48"
        run: python devops_news.py

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_ids_news.json
          git diff --cached --quiet || git commit -m "chore: update posted_ids_news [skip ci]"
          git push
