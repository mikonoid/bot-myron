name: "🇺🇦 DOU News"

on:
  schedule:
    # 2 рази на день: 11:00, 19:00 UTC
    - cron: "0 11,19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dou:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Post DOU news
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: "@devopsdaily"
          MAX_ITEMS: "1"
          MAX_AGE_HOURS: "48"
        run: python dou_news.py

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_ids_dou.json
          git diff --cached --quiet || git commit -m "chore: update posted_ids_dou [skip ci]"
          git push
