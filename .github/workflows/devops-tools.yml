name: "🛠️ DevOps Tools of the Week"

on:
  schedule:
    # Щосереди о 11:00 UTC (14:00 Kyiv)
    - cron: "0 11 * * 3"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Post DevOps tools
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: "@devopsdaily"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_TOOLS: "7"
        run: python devops_tools.py

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_ids_tools.json
          git diff --cached --quiet || git commit -m "chore: update posted_ids_tools [skip ci]"
          git push
