name: "📋 Weekly Digest"

on:
  schedule:
    # Щонеділі о 10:00 UTC (13:00 Kyiv)
    - cron: "0 10 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Post weekly digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: "@devopsdaily"
          MAX_PER_SECTION: "5"
        run: python weekly_digest.py

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_ids_digest.json
          git diff --cached --quiet || git commit -m "chore: update posted_ids_digest [skip ci]"
          git push
